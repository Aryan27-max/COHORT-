<html>
      <body>
            <input type = "text"></input>
            <button onclick="AddTodo()">Add Todo!</button>
      </body>

      <script>
            let ctr = 1;

            function DeleteTodo(index){
                  const element = document.getElementById(index);
                  element.parentNode.removeChild(element);
            }

            function AddTodo(){

                  const inputEL = document.querySelector("input");
                  const value = inputEL.value;

                  const newDivEl = document.createElement("div");
                  newDivEl.setAttribute("id",ctr);
                  newDivEl.innerHTML = "<div>" + value + '</div><button onclick="DeleteTodo('+ ctr +')">delete</button>';

                  document.querySelector("body").appendChild(newDivEl);

                  ctr = ctr + 1 ;
            }
      </script>
</html>
<!--  querySelector - used for specific usecase.
      quertSelectorAll - used to select all the usecaes of a specific branch. -->

      this means select document -> select the body of the html -> add a child element and add the div element to it
